{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-900 text-gray-100">
    <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-lg space-y-6">

        <h2 class="text-2xl font-bold text-center">Login</h2>

        {% if error %}
        <div class="bg-red-500/20 text-red-400 p-3 rounded-lg text-sm">
            {{ error }}
        </div>
        {% elif success %}
        <div class="bg-green-500/20 text-green-400 p-3 rounded-lg text-sm">
            {{ success }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Username or Email</label>
                <input type="text" name="email" required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit"
                class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition">
                Login
            </button>
        </form>

        <p class="text-sm text-gray-400 text-center">
            No account?
            <a href="/auth/register" class="text-blue-400 hover:underline">Register here</a>
        </p>

    </div>
</div>

{% if request.query_params.get('registered=true') %}
    <script>
        document.onload = function() {
            setTimeout(function() {
                window.location.href = "/auth/verify-notice";
            }, 2000);
        }
    </script>
{% endif %}

{% endblock %}
