{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-900 text-gray-100">
    <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-lg space-y-6">

        <h2 class="text-2xl font-bold text-center">Register</h2>
        <p class="text-sm text-gray-500 text-center">
            Additional info can be adjusted later in your profile settings.
        </p>

        {% if error %}
        <div class="bg-red-500/20 text-red-400 p-3 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="bg-green-500/20 text-green-400 p-3 rounded-lg text-sm">
            {{ success }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">

            <!-- Username (added) -->
            <div>
                <label class="block text-sm mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex space-x-4">
                <div>
                    <label class="block text-sm mb-1">First Name</label>
                    <input type="text" name="first_name" required
                        class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm mb-1">Last Name</label>
                    <input type="text" name="last_name" required
                        class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white placeholder-gray-400
                    focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit"
                class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition">
                Register
            </button>
        </form>

        <p class="text-sm text-gray-400 text-center">
            Already have an account?
            <a href="/auth/login" class="text-blue-400 hover:underline">Login here</a>
        </p>

    </div>
</div>

{% endblock %}
