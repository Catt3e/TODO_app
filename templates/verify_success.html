{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-900 text-gray-100">
    <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-lg space-y-6 text-center">

        <!-- Big success vibe -->
        <div class="text-green-400 text-5xl">
            ✓
        </div>

        <h2 class="text-2xl font-bold">You're Verified</h2>

        <p class="text-gray-400 text-sm">
            Your account has been successfully verified. You can now access all features.
        </p>

        {% if success %}
        <div class="bg-green-500/20 text-green-400 p-3 rounded-lg text-sm text-left">
            {{ success }}
        </div>
        {% endif %}

        <div class="space-y-3">
            <a href="/auth/login"
               class="block w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition">
                Go to Login
            </a>

            <!-- optional -->
            <a href="/"
               class="block w-full py-2 bg-gray-700 hover:bg-gray-600 rounded-lg font-semibold transition">
                Go to Home
            </a>
        </div>

        <p class="text-xs text-gray-500">
            Yeah, you're done here. Go do something useful.
        </p>

    </div>
</div>

{% endblock %}
